<body>
  <header class="header">
    <div class="header-content">
      <!--
        The logo text is a brand handle (@alaska45l) and is intentionally
        non-translated. Only the accessible label is localised.
      -->
      <a
        href="/"
        class="logo"
        data-router-link
        data-i18n-attr='{"aria-label":"nav.logo_aria"}'
        aria-label=""
      >@alaska45l</a>

      <nav class="nav" id="main-nav" aria-label="Main navigation"></nav>

      <div class="header-controls">
      <!-- Language toggle — desktop -->
      <button
        class="theme-toggle-desktop"
        data-action="toggle-language"
        data-i18n-attr='{"title":"nav.toggle_language","aria-label":"nav.toggle_language"}'
        title=""
        aria-label=""
      >
        <i class="fas fa-globe"></i>
      </button>

      <!-- Theme toggle — desktop -->
      <button
        class="theme-toggle-desktop"
        data-action="toggle-theme"
        data-i18n-attr='{"title":"nav.toggle_theme","aria-label":"nav.toggle_theme"}'
        title=""
        aria-label=""
      >
        <i class="fas fa-moon" id="themeIcon"></i>
      </button>

      </div>

      <button
        class="mobile-menu-btn"
        data-action="toggle-menu"
        data-i18n-attr='{"aria-label":"nav.toggle_menu"}'
        aria-label=""
      >
        <i class="fas fa-bars"></i>
      </button>

      <div class="mobile-menu" id="mobileMenu"></div>
    </div>
  </header>

  <div id="app">
    <!-- App Shell / Esqueleto de carga -->
    <!-- Se destruye instantáneamente cuando el router hace app.innerHTML = html -->
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; gap: 1rem; color: var(--text-muted, #888);">
      <i class="fas fa-circle-notch fa-spin" style="font-size: 2rem; color: var(--primary-color, #10b981);"></i>
      <span style="font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; opacity: 0.8;">Iniciando entorno...</span>
    </div>
  </div>

  <footer class="footer">
    <p data-i18n="footer.copyright"></p>
  </footer>

  <!-- Single ES-module entry point — Vite handles all bundling -->
  <script type="module" src="/js/main.js"></script>
