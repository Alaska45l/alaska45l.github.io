<!-- Pegar dentro de <ul class="projects-grid" role="list">
     inmediatamente después del último </li> existente (el de auditoría). -->

<!-- ── INVARIANT ─────────────────────────────────────────── -->
<li>
  <article
    class="project-card project-card--software"
    aria-labelledby="proj-invariant-title"
  >
    <header class="project-card__header">
      <span
        class="project-card__type-badge"
        aria-label=""
        data-i18n-attr='{"aria-label":"home.projects.invariant.type_aria"}'
      >
        <i class="fas fa-microchip" aria-hidden="true"></i>
        <span data-i18n="home.projects.invariant.type_badge"></span>
      </span>
      <span
        class="status-badge in-development"
        aria-label=""
        data-i18n-attr='{"aria-label":"home.projects.invariant.status_aria"}'
      >
        <i class="fas fa-circle-dot" aria-hidden="true"></i>
        <span data-i18n="home.projects.invariant.status"></span>
      </span>
    </header>

    <div class="project-card__body">
      <h3 class="project-card__title" id="proj-invariant-title"
          data-i18n="home.projects.invariant.title"></h3>
      <p class="project-card__description"
         data-i18n="home.projects.invariant.description"></p>
      <ul class="project-card__badges" role="list" aria-label="Tech stack">
        <li class="badge">Go · Ed25519</li>
        <li class="badge">Rust · Tauri</li>
        <li class="badge">Python · Arch</li>
        <li class="badge">SvelteKit</li>
        <li class="badge">Air-Gapped</li>
        <li class="badge">Ring-0</li>
      </ul>
    </div>

    <footer class="project-card__footer">
      <a
        href="/proyectos/invariant"
        data-router-link
        class="btn btn-primary"
        aria-label=""
        data-i18n-attr='{"aria-label":"home.projects.invariant.detail_aria"}'
      >
        <span data-i18n="home.projects.invariant.detail_btn"></span>
      </a>
    </footer>
  </article>
</li>
