<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta id="meta-og-url" property="og:url" content="https://alaska45l.github.io">
  <meta id="meta-og-title" property="og:title" content="Alaska E. González — Portafolio profesional">
  <meta id="meta-og-description" property="og:description" content="Explora el portafolio de Alaska E. González: proyectos, habilidades técnicas, estudios y contacto profesional en desarrollo web, diseño y soporte IT.">
  <meta property="og:image" content="https://alaska45l.github.io/assets/profile.webp">
  <meta property="og:locale" content="es_ES">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta id="meta-twitter-url" name="twitter:url" content="https://alaska45l.github.io">
  <meta id="meta-twitter-title" name="twitter:title" content="Alaska E. González — Portafolio profesional">
  <meta id="meta-twitter-description" name="twitter:description" content="Explora el portafolio de Alaska E. González: proyectos, habilidades técnicas, estudios y contacto profesional en desarrollo web, diseño y soporte IT.">
  <meta name="twitter:image" content="https://alaska45l.github.io/assets/profile.webp">
  
  <title id="page-title">Alaska E. González — Portafolio</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <!-- Core styles -->
  <!-- 1. Tokens, reset, body, dark-mode token overrides -->
  <link rel="stylesheet" href="css/base.css">

  <!-- 2. Header, nav, mobile menu, container, grid, footer -->
  <link rel="stylesheet" href="css/layout.css">

  <!-- 3. @keyframes fadeInUp, tag/badge utilities, accessibility -->
  <link rel="stylesheet" href="css/utilities.css">

  <!-- 4. .btn variants, .copy-btn, .telegram-btn -->
  <link rel="stylesheet" href="css/components/buttons.css">

  <!-- 5. .card, .about-skill-card, .philosophy-card, .project-card -->
  <link rel="stylesheet" href="css/components/cards.css">

  <!-- 6. .contact-form-container, .form-group, error states -->
  <link rel="stylesheet" href="css/components/forms.css">

  <!-- 7. Carousel, portfolio, dark mode + responsive co-located -->
  <link rel="stylesheet" href="css/components/carousel.css">

  <!-- 8. Timeline, polaroid, accordion — replaces experience.css -->
  <link rel="stylesheet" href="css/components/timeline.css">

  <!-- 9. Hero, education, contact, social-links sidebar -->
  <link rel="stylesheet" href="css/pages/home.css">

  <!-- 10. Remaining style.css rules (see REMAINING CONTENT below) -->
  <link rel="stylesheet" href="css/style.css">

  <!-- 11. Konsole terminal window — must follow cards.css -->
  <link rel="stylesheet" href="css/terminal.css">

  <!-- 12. Remaining body.dark-mode overrides — MUST BE LAST -->
  <link rel="stylesheet" href="css/theme/dark.css">

  <!-- Experience accordion styles (isolated, depends on :root vars from style.css) -->
  <link rel="stylesheet" href="css/experience.css">
  
  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
  <link rel="manifest" href="assets/favicon/site.webmanifest">
</head>

<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <a href="/" class="logo" data-router-link>
        @alaska45l
      </a>
      
      <nav class="nav" id="main-nav">
      </nav>

      <!-- Toggle de modo oscuro -->
      <button class="theme-toggle-desktop" onclick="toggleDarkMode()" title="Cambiar tema">
        <i class="fas fa-moon" id="themeIcon"></i>
      </button>

      <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
        <i class="fas fa-bars"></i>
      </button>

      <div class="mobile-menu" id="mobileMenu">
      </div>
    </div>
  </header>

  <!-- Main Content Container -->
  <div id="app"></div>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2025 Alaska E. González — Diseñado con ♥ y café</p>
  </footer>

  <!-- Core scripts -->
  <script src="js/menu.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/form.js"></script>
  <script src="js/router.js"></script>
  <script src="js/accordion.js"></script>
  <script src="js/terminal.js"></script>

  <!-- Experience accordion — SPA-aware, self-initialising via MutationObserver -->
  <script src="js/experienceAccordion.js"></script>

  <!-- Quantum Cat Invaders — cargados después del router para que GAME_CONFIG
       esté disponible cuando game.js registra el MutationObserver -->
  <script src="js/game/config.js"></script>
  <script src="js/game/entities.js"></script>
  <script src="js/game/renderer.js"></script>
  <script src="js/game/game.js"></script>
</body>
</html>
